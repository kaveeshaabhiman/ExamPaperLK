<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth-guard.js"></script>
    <title>Advanced Level - ExamPaperLK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans text-gray-800 antialiased bg-gray-50/30">

    <!-- Navigation -->
    <nav class="fixed w-full z-[100] transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div
                class="flex justify-between items-center h-20 glass-card mt-4 rounded-3xl shadow-xl px-8 backdrop-blur-xl bg-white/80 border border-white/50">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-purple-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg"
                        data-logo-text>E</div>
                    <span class="font-black text-2xl tracking-tighter text-gray-900" data-site-name>ExamPaperLK</span>
                </div>
                <div class="hidden md:block">
                    <div class="flex items-center space-x-2" data-nav-menu></div>
                </div>
                <div class="md:hidden">
                    <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-900">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="relative pt-48 pb-20 px-4 overflow-hidden flex flex-col items-center justify-center">
        <!-- Dynamic Background Elements -->
        <div class="blob w-[30rem] h-[30rem] bg-indigo-500 top-[-20%] left-[-10%] opacity-50"></div>
        <div class="blob w-[25rem] h-[25rem] bg-pink-400 bottom-[-10%] right-[-10%] animate-float-reverse opacity-40">
        </div>

        <div class="max-w-7xl mx-auto text-center relative z-10 animate-slide-up">
            <span
                class="inline-block px-6 py-2 rounded-full text-xs font-black uppercase tracking-[0.2em] glass-panel text-gradient mb-6">Premium
                Archives</span>
            <h1 class="text-5xl md:text-7xl font-black text-slate-900 tracking-tighter leading-none mb-6">G.C.E.
                Advanced Level</h1>
            <p class="text-slate-500 font-medium max-w-2xl mx-auto text-lg leading-relaxed">The most comprehensive
                collection of A/L past papers in the country.</p>
        </div>
    </header>

    <!-- Subjects Grid -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
        <div id="subjects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Dynamically populated from siteConfig.subjects['AL'] -->
        </div>
    </section>

    <!-- Global Footer -->
    <footer></footer>

    <script src="data.js"></script>
    <script src="count-papers.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('subjects-grid');
            const subjects = getSubjects('AL');

            if (grid) {
                grid.innerHTML = subjects.map(sub => `
                    <a href="paper-view.html?subject=${sub.name}&level=AL" class="group relative bg-white/70 backdrop-blur-xl p-10 rounded-[3rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_20px_40px_-15px_rgba(0,0,0,0.1)] transition-all duration-500 hover:-translate-y-3 cursor-pointer border border-white h-72 flex flex-col justify-between overflow-hidden hover-lift">
                        <div class="absolute inset-0 bg-gradient-to-br from-white/40 to-white/0 z-0"></div>
                        <div class="absolute top-[-20%] right-[-20%] w-48 h-48 bg-${sub.color}-500/10 rounded-full blur-3xl group-hover:bg-${sub.color}-500/20 transition-all duration-1000 -mr-8 -mt-8 group-hover:scale-150"></div>
                        <div class="relative z-10">
                            <div class="w-16 h-16 bg-gradient-to-br from-${sub.color}-500 to-${sub.color}-700 rounded-3xl flex items-center justify-center text-white mb-8 shadow-lg shadow-${sub.color}-200/50 group-hover:scale-110 transition-transform duration-500 group-hover:rotate-3">
                                <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1H9L8 4zm.5 1h7l.5 1h-8l.5-1z" />
                                </svg>
                            </div>
                            <h3 class="text-3xl font-black text-slate-800 tracking-tight leading-none mb-3 group-hover:text-${sub.color}-600 transition-colors">${sub.name}</h3>
                            <p class="text-slate-400 font-bold uppercase tracking-[0.2em] text-[11px]">${sub.sinhala}</p>
                        </div>
                        <div class="relative z-10 flex justify-between items-center mt-6">
                            <span data-count-target data-subject="${sub.name}" data-level="AL" class="text-[11px] font-black text-${sub.color}-600 bg-${sub.color}-50 border border-${sub.color}-100 px-5 py-2 rounded-full uppercase tracking-widest shadow-sm">Loading...</span>
                            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-400 group-hover:bg-gradient-to-br group-hover:from-${sub.color}-500 group-hover:to-${sub.color}-600 group-hover:text-white transition-all duration-300 shadow-md group-hover:shadow-xl group-hover:shadow-${sub.color}-200">
                                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                            </div>
                        </div>
                    </a>
                `).join('');

                setTimeout(() => window.dispatchEvent(new Event('DOMContentLoaded')), 100);
            }
        });
    </script>
</body>

</html>
