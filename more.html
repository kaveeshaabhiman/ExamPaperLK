<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth-guard.js"></script>
    <title>More Categories - ExamPaperLK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans text-gray-800 antialiased overflow-x-hidden bg-gray-50/10">

    <!-- Navigation -->
    <nav class="fixed w-full z-[100] transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div
                class="flex justify-between items-center h-20 glass-card mt-4 rounded-3xl shadow-xl px-8 backdrop-blur-xl bg-white/80 border border-white/50">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-purple-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg"
                        data-logo-text>E</div>
                    <span class="font-black text-2xl tracking-tighter text-gray-900" data-site-name>ExamPaperLK</span>
                </div>
                <div class="hidden md:block">
                    <div class="flex items-center space-x-2" data-nav-menu></div>
                </div>
                <div class="md:hidden">
                    <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-900">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="pt-48 pb-16 px-4 bg-white border-b border-gray-100">
        <div class="max-w-7xl mx-auto text-center">
            <span
                class="inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest bg-gray-50 text-gray-400 mb-4">Complete
                Archives</span>
            <h1 class="text-4xl md:text-6xl font-black text-gray-900 tracking-tighter leading-none mb-4">Explore More
                Papers</h1>
            <p class="text-gray-500 font-medium max-w-2xl mx-auto">Browse through our entire collection of exams, term
                tests, and model papers across all levels.</p>
        </div>
    </header>

    <!-- Categories Grid -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
        <div id="more-categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Dynamically Build from siteConfig.categories -->
        </div>
    </main>

    <!-- Global Footer -->
    <footer></footer>

    <script src="data.js"></script>
    <script src="count-papers.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('more-categories-grid');
            if (grid) {
                grid.innerHTML = siteConfig.categories.map(cat => `
                    <a href="paper-view.html?level=${cat.name}" class="group relative bg-white p-10 rounded-[2.5rem] shadow-xl hover:shadow-2xl transition-all hover:-translate-y-2 border border-gray-100 h-72 flex flex-col justify-between overflow-hidden">
                        <div class="absolute top-0 right-0 w-40 h-40 bg-${cat.color}-500/5 rounded-bl-[6rem] -mr-10 -mt-10 group-hover:scale-110 transition-transform"></div>
                        <div class="z-10">
                            <div class="w-16 h-16 bg-gradient-to-br from-${cat.color}-500 to-${cat.color}-700 rounded-2xl flex items-center justify-center text-white mb-8 shadow-lg shadow-${cat.color}-100">
                                <span class="font-black text-2xl">${cat.icon}</span>
                            </div>
                            <h3 class="text-3xl font-black text-gray-900 tracking-tight leading-none mb-2">${cat.name}</h3>
                            <p class="text-gray-400 font-bold uppercase tracking-widest text-[10px]">${cat.fullName}</p>
                        </div>
                        <div class="z-10 flex justify-between items-center">
                            <span data-count-target data-level="${cat.name === 'O/L' ? 'OL' : cat.name === 'A/L' ? 'AL' : cat.name}" class="text-[10px] font-black text-${cat.color}-600 bg-${cat.color}-50 px-4 py-1.5 rounded-full uppercase tracking-widest">Loading...</span>
                            <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400 group-hover:bg-primary group-hover:text-white transition-all shadow-sm">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                            </div>
                        </div>
                    </a>
                `).join('');

                // Re-trigger counter
                setTimeout(() => window.dispatchEvent(new Event('DOMContentLoaded')), 100);
            }
        });
    </script>
</body>

</html>
