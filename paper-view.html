<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth-guard.js"></script>
    <title>View Papers - ExamPaperLK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans text-gray-800 antialiased bg-gray-50/10">

    <!-- Navigation -->
    <nav class="fixed w-full z-[100] transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div
                class="flex justify-between items-center h-20 glass-card mt-4 rounded-3xl shadow-xl px-8 backdrop-blur-xl bg-white/80 border border-white/50">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-purple-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg"
                        data-logo-text>E</div>
                    <span class="font-black text-2xl tracking-tighter text-gray-900" data-site-name>ExamPaperLK</span>
                </div>
                <div class="hidden md:block">
                    <div class="flex items-center space-x-2" data-nav-menu></div>
                </div>
                <div class="md:hidden">
                    <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-900">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header
        class="relative pt-48 pb-16 px-4 overflow-hidden bg-gradient-to-b from-white to-slate-50 border-b border-gray-100">
        <!-- Dynamic Background Elements -->
        <div class="blob w-[30rem] h-[30rem] bg-indigo-500 top-[-20%] left-[-10%] opacity-20"></div>
        <div class="blob w-[25rem] h-[25rem] bg-pink-400 bottom-[-10%] right-[-10%] animate-float-reverse opacity-20">
        </div>

        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-end gap-6 relative z-10">
            <div
                class="animate-slide-up bg-white/40 p-10 rounded-[2.5rem] backdrop-blur-3xl border border-white flex-1 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                <div id="level-badge"
                    class="inline-block px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.2em] bg-indigo-50 text-indigo-500 mb-6 shadow-sm border border-indigo-100/50">
                    Loading Level...</div>
                <h1 id="subject-title"
                    class="text-5xl md:text-7xl font-black text-slate-800 tracking-tighter leading-none mb-4 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-indigo-600 group-hover:to-pink-600 transition-all">
                    Subject
                </h1>
                <p class="text-slate-500 font-medium text-lg leading-relaxed max-w-xl">Download past papers and marking
                    schemes for free securely from our vault.</p>
            </div>
            <div class="flex items-center gap-4 animate-slide-up hidden md:flex" style="animation-delay: 0.2s;">
                <div class="flex flex-col items-end">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">Available
                        Documents</span>
                    <div id="paper-count-badge"
                        class="px-8 py-4 bg-gradient-to-br from-slate-900 to-slate-800 text-white rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-2xl flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                        <span class="count-value">0</span> PAPERS
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div id="papers-container" class="grid grid-cols-1 gap-4">
            <!-- Dynamically Build from papersData -->
        </div>
    </main>

    <!-- Footer -->
    <footer></footer>

    <!-- Paper Viewer Modal -->
    <div id="paper-modal" class="fixed inset-0 z-[200] hidden">
        <div class="absolute inset-0 bg-gray-900/95 backdrop-blur-sm" onclick="closeViewer()"></div>
        <div
            class="absolute inset-4 md:inset-10 bg-white rounded-[2.5rem] shadow-2xl overflow-hidden animate-slide-up flex flex-col">
            <div class="h-20 flex items-center justify-between px-8 bg-white border-b border-gray-100">
                <h4 id="modal-title" class="font-black text-gray-900 truncate pr-10 text-xl tracking-tight">Viewing
                    Paper</h4>
                <button onclick="closeViewer()"
                    class="w-12 h-12 flex items-center justify-center hover:bg-gray-100 rounded-2xl transition-all">
                    <svg class="w-6 h-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="flex-1 bg-gray-100 relative">
                <iframe id="viewer-frame" class="w-full h-full border-0" allow="autoplay"></iframe>
                <div id="viewer-loading"
                    class="absolute inset-0 flex items-center justify-center bg-white z-10 transition-opacity">
                    <div class="flex flex-col items-center gap-6">
                        <div class="w-16 h-16 border-4 border-primary border-t-transparent rounded-full animate-spin">
                        </div>
                        <p class="text-xs font-black text-gray-300 uppercase tracking-widest">Opening Secure Archive...
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function openViewer(link, title) {
            const modal = document.getElementById('paper-modal');
            const frame = document.getElementById('viewer-frame');
            const loading = document.getElementById('viewer-loading');
            document.getElementById('modal-title').textContent = title;
            loading.style.opacity = '1';
            loading.style.display = 'flex';
            frame.src = link;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            frame.onload = () => { loading.style.opacity = '0'; setTimeout(() => loading.style.display = 'none', 300); };
        }

        function closeViewer() {
            document.getElementById('paper-modal').classList.add('hidden');
            document.getElementById('viewer-frame').src = '';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const currentSubject = urlParams.get('subject') || 'All Subjects';
            const currentLevel = urlParams.get('level');

            document.getElementById('subject-title').textContent = currentSubject;
            const badge = document.getElementById('level-badge');
            if (currentLevel === 'AL') { badge.textContent = "G.C.E. Advanced Level"; badge.className = badge.className.replace('text-gray-500', 'text-pink-600').replace('bg-gray-100', 'bg-pink-50'); }
            else if (currentLevel === 'OL') { badge.textContent = "G.C.E. Ordinary Level"; badge.className = badge.className.replace('text-gray-500', 'text-indigo-600').replace('bg-gray-100', 'bg-indigo-50'); }
            else { badge.textContent = currentLevel + " Papers"; }

            const container = document.getElementById('papers-container');
            const filtered = papersData.filter(p => {
                const lvlMatch = currentLevel ? (p.level === (currentLevel === 'OL' ? 'O/L' : currentLevel === 'AL' ? 'A/L' : currentLevel)) : true;
                const subMatch = (currentSubject === 'All Subjects') ? true : (p.subject === currentSubject);
                return lvlMatch && subMatch;
            });

            const badgeEl = document.getElementById('paper-count-badge');
            if (badgeEl.querySelector('.count-value')) {
                badgeEl.querySelector('.count-value').textContent = filtered.length;
            } else {
                badgeEl.textContent = filtered.length + " PAPERS";
            }

            // Grouping Logic
            const groups = filtered.reduce((acc, p) => {
                if (!acc[p.type]) acc[p.type] = {};
                if (!acc[p.type][p.year]) acc[p.type][p.year] = [];
                acc[p.type][p.year].push(p);
                return acc;
            }, {});

            container.innerHTML = Object.entries(groups).map(([type, years]) => `
                <div class="mb-20">
                    <div class="flex items-center gap-4 mb-10">
                        <h2 class="text-3xl font-black text-gray-900 tracking-tighter uppercase italic">${type}s</h2>
                        <div class="h-1 flex-1 bg-gradient-to-r from-gray-100 to-transparent rounded-full"></div>
                    </div>
                    
                    ${Object.entries(years).sort((a, b) => b[0] - a[0]).map(([year, papers]) => `
                        <div class="mb-10 ml-0 md:ml-4">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="w-10 h-1 bg-primary rounded-full"></span>
                                <h3 class="text-xl font-bold text-gray-400 font-mono tracking-widest">${year} Archive</h3>
                            </div>
                            <div class="grid grid-cols-1 gap-4">
                                ${papers.map(p => `
                                    <div class="group bg-white/60 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-[0_4px_20px_rgb(0,0,0,0.03)] hover:shadow-[0_20px_40px_-20px_rgba(79,70,229,0.3)] border border-white hover:border-indigo-100 flex flex-col md:flex-row justify-between items-center transition-all duration-500 hover:-translate-y-2 relative overflow-hidden">
                                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-white/0 group-hover:-translate-x-full transition-all duration-1000 transform translate-x-[200%] z-0"></div>
                                        <div class="flex items-center gap-6 text-center md:text-left relative z-10 w-full md:w-auto">
                                            <div class="hidden md:flex w-16 h-16 bg-gradient-to-br from-indigo-50 to-purple-50 rounded-2xl items-center justify-center font-black text-xl text-indigo-500 border border-white shadow-inner group-hover:scale-110 transition-transform duration-500">${p.year}</div>
                                            <div class="w-full">
                                                <h3 class="text-2xl font-black text-slate-800 tracking-tight leading-none mb-3 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-indigo-600 group-hover:to-pink-600 transition-all">${p.title}</h3>
                                                <div class="flex flex-wrap items-center justify-center md:justify-start gap-3">
                                                    <span class="text-[10px] font-black uppercase tracking-[0.2em] px-4 py-1.5 bg-slate-50 border border-slate-100 rounded-full text-slate-400">${p.type}</span>
                                                    ${p.part ? `<span class="text-[10px] font-black uppercase tracking-[0.2em] px-4 py-1.5 bg-amber-50 border border-amber-100/50 rounded-full text-amber-600">${p.part}</span>` : ''}
                                                    <span class="text-[10px] font-black uppercase tracking-[0.2em] px-4 py-1.5 bg-emerald-50 border border-emerald-100/50 rounded-full text-emerald-600">${p.medium}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="flex gap-4 mt-8 md:mt-0 w-full md:w-auto relative z-10">
                                            <button onclick="openViewer('${p.viewLink}', '${p.title}')" class="flex-1 md:w-32 py-4 bg-white border-2 border-slate-100 rounded-[1.25rem] text-[10px] font-black group-hover:border-indigo-500 group-hover:text-indigo-600 text-slate-400 hover:shadow-lg transition-all uppercase tracking-[0.2em] flex items-center justify-center gap-2">
                                                <svg class="w-4 h-4 hidden sm:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                                View
                                            </button>
                                            <a href="${p.downloadLink}" download class="flex-1 md:w-40 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-[1.25rem] text-[10px] font-black text-center shadow-lg hover:shadow-indigo-500/50 hover:scale-105 transition-all uppercase tracking-[0.2em] flex items-center justify-center gap-2">
                                                <svg class="w-4 h-4 hidden sm:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                                Download
                                            </a>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        });
    </script>
</body>

</html>
