<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth-guard.js"></script>
    <title>ExamPaperLK - Dynamic No-Code Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans text-gray-800 antialiased overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed w-full z-[100] transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div
                class="flex justify-between items-center h-20 glass-card mt-4 rounded-3xl shadow-xl px-8 backdrop-blur-xl bg-white/80 border border-white/50">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-purple-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg"
                        data-logo-text>E</div>
                    <span class="font-black text-2xl tracking-tighter text-gray-900" data-site-name>ExamPaperLK</span>
                </div>
                <!-- Navigation Hook -->
                <div class="hidden md:block">
                    <div class="flex items-center space-x-2" data-nav-menu></div>
                </div>
                <div class="md:hidden">
                    <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-900">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="relative pt-48 pb-32 overflow-hidden flex items-center min-h-[90vh]">
        <!-- Dynamic Background Elements -->
        <div class="blob w-[30rem] h-[30rem] bg-indigo-500 top-[-10%] left-[-10%]"></div>
        <div class="blob w-[40rem] h-[40rem] bg-pink-400 bottom-[-20%] right-[-10%] animate-float-reverse"></div>
        <div class="blob w-[25rem] h-[25rem] bg-cyan-300 top-[20%] right-[10%] animate-float"
            style="animation-delay: 2s;"></div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
            <div class="inline-block mb-6 px-6 py-2 rounded-full glass-panel border-gradient animate-slide-up">
                <span class="text-xs font-black uppercase tracking-[0.2em] text-gradient">Welcome to the Future of
                    Education</span>
            </div>

            <h1 id="site-hero-title"
                class="text-6xl md:text-8xl lg:text-[7rem] font-black tracking-tighter mb-8 leading-[1.1] animate-slide-up"
                style="animation-delay: 0.1s;">
                <span class="block text-slate-900 mb-2 drop-shadow-sm tracking-tighter">ExamPaperLK</span>
                <span class="text-gradient drop-shadow-md inline-block">Your Paper Library</span>
            </h1>

            <p id="site-hero-subtitle"
                class="text-xl md:text-2xl text-slate-600 max-w-3xl mx-auto mb-14 font-medium leading-relaxed animate-slide-up"
                style="animation-delay: 0.2s;">
                Access thousands of past papers and marking schemes instantly.
            </p>

            <div class="flex flex-col sm:flex-row justify-center items-center gap-6 animate-slide-up"
                style="animation-delay: 0.3s;">
                <a id="site-hero-button" href="#explore"
                    class="px-14 py-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-black rounded-full shadow-[0_20px_40px_-15px_rgba(79,70,229,0.5)] hover:shadow-[0_20px_50px_-10px_rgba(79,70,229,0.7)] hover:-translate-y-2 transition-all duration-300 active:scale-95 text-lg uppercase tracking-wider relative overflow-hidden group">
                    <span class="relative z-10">Get Started</span>
                    <div
                        class="absolute inset-0 h-full w-full bg-gradient-to-r from-purple-600 to-pink-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    </div>
                </a>
                <a href="#features"
                    class="px-14 py-5 bg-white text-slate-900 font-black rounded-full shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 text-lg uppercase tracking-wider border border-slate-100 hover:border-indigo-100">
                    Learn More
                </a>
            </div>
        </div>
    </header>

    <!-- Category Grid Section -->
    <section id="explore" class="py-24 bg-gray-50/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-black text-gray-900 tracking-tighter mb-4">Pick Your Level</h2>
                <div class="w-20 h-1.5 bg-primary mx-auto rounded-full"></div>
            </div>
            <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                <!-- Dynamically Build from siteConfig.categories -->
            </div>
        </div>
    </section>

    <!-- Features Section -->
    <section class="py-32">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="feature-grid" class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <!-- Dynamically Build from siteConfig.features -->
            </div>
        </div>
    </section>

    <!-- Global Footer -->
    <footer></footer>

    <!-- CORE SCRIPTS -->
    <script src="data.js"></script>
    <script src="count-papers.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Build Category Cards
            const grid = document.getElementById('categories-grid');
            if (grid) {
                grid.innerHTML = siteConfig.categories.map(cat => `
                    <a href="paper-view.html?level=${cat.name}" class="group relative bg-white/70 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] hover:shadow-[0_20px_40px_-15px_rgba(0,0,0,0.1)] transition-all duration-500 hover:-translate-y-3 cursor-pointer border border-white overflow-hidden hover-lift">
                        <div class="absolute inset-0 bg-gradient-to-br from-white/40 to-white/0 z-0"></div>
                        <div class="absolute top-[-20%] right-[-20%] w-40 h-40 bg-${cat.color}-500/10 rounded-full blur-2xl group-hover:bg-${cat.color}-500/20 transition-all duration-1000 -mr-8 -mt-8 group-hover:scale-150"></div>
                        <div class="relative z-10 h-full flex flex-col justify-between">
                            <div>
                                <div class="w-16 h-16 bg-gradient-to-br from-${cat.color}-500 to-${cat.color}-700 rounded-2xl flex items-center justify-center text-white mb-6 shadow-lg shadow-${cat.color}-200/50 group-hover:scale-110 transition-transform duration-500 group-hover:rotate-3">
                                    <span class="font-black text-2xl">${cat.icon}</span>
                                </div>
                                <h3 class="text-3xl font-black text-slate-800 mb-2 tracking-tight group-hover:text-${cat.color}-600 transition-colors">${cat.name}</h3>
                                <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">${cat.fullName}</p>
                            </div>
                            <div class="mt-12 flex items-center justify-between">
                                <span class="text-[10px] font-black bg-${cat.color}-50 text-${cat.color}-600 px-4 py-2 border border-${cat.color}-100 rounded-full uppercase tracking-widest shadow-sm" data-count-target data-level="${cat.name === 'O/L' ? 'OL' : cat.name === 'A/L' ? 'AL' : cat.name}">Loading...</span>
                                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-400 group-hover:bg-gradient-to-br group-hover:from-${cat.color}-500 group-hover:to-${cat.color}-600 group-hover:text-white transition-all duration-300 shadow-md group-hover:shadow-xl group-hover:shadow-${cat.color}-200">
                                    <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                                </div>
                            </div>
                        </div>
                    </a>
                `).join('');

                // Re-trigger counter
                setTimeout(() => window.dispatchEvent(new Event('DOMContentLoaded')), 100);
            }
        });
    </script>
</body>

</html>
