<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="auth-guard.js"></script>
    <title>ExamPaperLK - Dynamic No-Code Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans text-gray-800 antialiased overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed w-full z-[100] transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div
                class="flex justify-between items-center h-20 glass-card mt-4 rounded-3xl shadow-xl px-8 backdrop-blur-xl bg-white/80 border border-white/50">
                <div class="flex-shrink-0 flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-purple-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg"
                        data-logo-text>E</div>
                    <span class="font-black text-2xl tracking-tighter text-gray-900" data-site-name>ExamPaperLK</span>
                </div>
                <!-- Navigation Hook -->
                <div class="hidden md:block">
                    <div class="flex items-center space-x-2" data-nav-menu></div>
                    <button onclick="localStorage.removeItem('currentUser'); location.reload();"
                        class="ml-4 text-[10px] font-black text-red-400 hover:text-red-600 uppercase tracking-widest px-4 py-2 rounded-xl hover:bg-red-50 transition-all">Logout</button>
                </div>
                <div class="md:hidden">
                    <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-gray-50 text-gray-900">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="relative pt-48 pb-24 overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center animate-slide-up">
            <h1 id="site-hero-title" class="text-6xl md:text-8xl font-black tracking-tighter mb-8 leading-none">
                Loading Assets...
            </h1>
            <p id="site-hero-subtitle"
                class="text-xl text-gray-500 max-w-3xl mx-auto mb-12 font-medium leading-relaxed">
                Fetching latest content from cloud...
            </p>
            <div class="flex justify-center">
                <a id="site-hero-button" href="#explore"
                    class="px-14 py-6 bg-primary text-white font-black rounded-[2rem] shadow-2xl hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95 shadow-indigo-100">
                    Get Started
                </a>
            </div>
        </div>
        <!-- Decorative blobs -->
        <div
            class="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 bg-primary/10 rounded-full blur-[100px] pointer-events-none">
        </div>
        <div
            class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 bg-purple-100 rounded-full blur-[80px] pointer-events-none">
        </div>
    </header>

    <!-- Category Grid Section -->
    <section id="explore" class="py-24 bg-gray-50/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-black text-gray-900 tracking-tighter mb-4">Pick Your Level</h2>
                <div class="w-20 h-1.5 bg-primary mx-auto rounded-full"></div>
            </div>
            <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                <!-- Dynamically Build from siteConfig.categories -->
            </div>
        </div>
    </section>

    <!-- Features Section -->
    <section class="py-32">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="feature-grid" class="grid grid-cols-1 md:grid-cols-3 gap-12">
                <!-- Dynamically Build from siteConfig.features -->
            </div>
        </div>
    </section>

    <!-- Global Footer -->
    <footer></footer>

    <!-- CORE SCRIPTS -->
    <script src="data.js"></script>
    <script src="count-papers.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Build Category Cards
            const grid = document.getElementById('categories-grid');
            if (grid) {
                grid.innerHTML = siteConfig.categories.map(cat => `
                    <a href="paper-view.html?level=${cat.name}" class="group relative bg-white p-8 rounded-[2.5rem] shadow-xl hover:shadow-2xl transition-all hover:-translate-y-2 border border-gray-100 overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-${cat.color}-500/10 rounded-bl-[5rem] -mr-8 -mt-8 group-hover:scale-110 transition-transform"></div>
                        <div class="relative z-10 h-full flex flex-col justify-between">
                            <div>
                                <div class="w-14 h-14 bg-gradient-to-br from-${cat.color}-500 to-${cat.color}-700 rounded-2xl flex items-center justify-center text-white mb-6 shadow-lg shadow-${cat.color}-200">
                                    <span class="font-black text-xl">${cat.icon}</span>
                                </div>
                                <h3 class="text-2xl font-black text-gray-900 mb-2">${cat.name}</h3>
                                <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">${cat.fullName}</p>
                            </div>
                            <div class="mt-10 flex items-center justify-between">
                                <span class="text-[10px] font-black bg-${cat.color}-50 text-${cat.color}-600 px-4 py-1.5 rounded-full uppercase tracking-widest" data-count-target data-level="${cat.name === 'O/L' ? 'OL' : cat.name === 'A/L' ? 'AL' : cat.name}">Loading...</span>
                                <div class="w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400 group-hover:bg-primary group-hover:text-white transition-all shadow-sm">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                                </div>
                            </div>
                        </div>
                    </a>
                `).join('');

                // Re-trigger counter
                setTimeout(() => window.dispatchEvent(new Event('DOMContentLoaded')), 100);
            }
        });
    </script>
</body>

</html>
