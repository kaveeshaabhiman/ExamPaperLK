<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigh In - ExamPaperLK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%) scale(1);
            }

            to {
                transform: translate(20%, 20%) scale(1.2);
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1.1);
            }

            50% {
                transform: translateY(-10px) scale(1.15);
            }

            100% {
                transform: translateY(0) scale(1.1);
            }
        }

        .animate-float {
            animation: float 15s ease-in-out infinite;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slide-up 1s ease-out forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-fade-in {
            animation: fade-in 0.3s ease-out forwards;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-[#050810] overflow-hidden">
    <!-- Persistent Background Image for All Devices -->
    <div class="fixed inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1523240715181-2f0bd9a269cc?auto=format&fit=crop&q=80&w=2070"
            class="w-full h-full object-cover opacity-30 lg:opacity-60 scale-110 animate-float"
            style="filter: brightness(0.4) contrast(1.2);">
        <div class="absolute inset-0 bg-gradient-to-tr from-indigo-900/40 via-transparent to-purple-900/20"></div>
        <div class="absolute inset-0 backdrop-blur-[4px] lg:backdrop-blur-none"></div>
    </div>

    <!-- Main Container -->
    <div class="flex w-full min-h-screen relative z-10">

        <!-- Left Side: Visual Immersive Area (Responsive Visibility) -->
        <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden items-center justify-center p-20">
            <div class="max-w-lg animate-slide-up">
                <div class="w-20 h-2 bg-indigo-500 rounded-full mb-10"></div>
                <h2 class="text-7xl font-black text-white tracking-tighter leading-none mb-8">Master Your <span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Future.</span>
                </h2>
                <p class="text-xl text-slate-300 font-medium leading-relaxed mb-12">Access the largest archive of
                    premium exam papers across Sri Lanka. Your journey to excellence starts here.</p>

                <div class="flex items-center gap-6">
                    <div class="flex -space-x-4">
                        <img src="https://i.pravatar.cc/100?u=1"
                            class="w-12 h-12 rounded-full border-2 border-indigo-900">
                        <img src="https://i.pravatar.cc/100?u=2"
                            class="w-12 h-12 rounded-full border-2 border-indigo-900">
                        <img src="https://i.pravatar.cc/100?u=3"
                            class="w-12 h-12 rounded-full border-2 border-indigo-900">
                        <div
                            class="w-12 h-12 rounded-full bg-indigo-600 border-2 border-indigo-900 flex items-center justify-center text-[10px] font-black text-white">
                            +10k</div>
                    </div>
                    <span class="text-xs font-black uppercase text-indigo-300 tracking-[0.2em]">Joined the elite</span>
                </div>
            </div>

            <!-- Floating Decorative Elements -->
            <div class="absolute top-20 right-20 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl animate-pulse"></div>
            <div class="absolute bottom-40 left-10 w-40 h-40 bg-purple-500/20 rounded-full blur-3xl animate-pulse"
                style="animation-delay: 2s;"></div>
        </div>

        <!-- Right Side: Login Section -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 relative">


            <div class="w-full max-w-[480px] relative z-10 transition-all duration-1000 opacity-0 transform translate-y-10"
                id="loginCard">
                <div class="glass p-10 md:p-14 rounded-[3.5rem] text-center border-white/5">
                    <!-- Logo Section -->
                    <div
                        class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-10 shadow-2xl shadow-indigo-500/30 rotate-3 transform hover:rotate-0 transition-all cursor-pointer">
                        <span class="text-4xl font-black">E</span>
                    </div>

                    <div id="authContent">
                        <h1 class="text-4xl font-black text-white mb-3 tracking-tighter">Welcome Back</h1>
                        <p class="text-slate-500 font-medium mb-10">Sign in to sync your progress</p>

                        <form onsubmit="handleAuth(event)" class="space-y-4">
                            <div id="registerFields" class="hidden space-y-4">
                                <input type="text" id="name" placeholder="Full Name"
                                    class="w-full px-8 py-5 rounded-2xl input-glass outline-none font-medium text-sm">
                            </div>
                            <input type="email" id="email" required placeholder="Gmail Address"
                                class="w-full px-8 py-5 rounded-2xl input-glass outline-none font-medium text-sm">

                            <div class="relative group">
                                <input type="password" id="password" required placeholder="••••••••"
                                    class="w-full px-8 py-5 rounded-2xl input-glass outline-none font-medium tracking-widest text-center text-sm pr-16">
                                <button type="button" onclick="togglePassword()"
                                    class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-500 hover:text-indigo-400 transition-colors">
                                    <svg id="eyeIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </button>
                            </div>

                            <button type="submit" id="submitBtn"
                                class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-500 transition-all shadow-[0_20px_40px_-10px_rgba(79,70,229,0.4)] active:scale-95 mt-6 uppercase tracking-widest text-[10px]">
                                Unlock Archive
                            </button>



                            <div class="mt-10">
                                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                                    <span id="toggleText">Access required?</span>
                                    <button type="button" onclick="toggleMode()"
                                        class="text-indigo-400 font-black hover:text-white transition-colors ml-1"
                                        id="toggleBtn">Build Account</button>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isRegister = false;

        window.onload = () => {
            const card = document.getElementById('loginCard');
            card.classList.remove('opacity-0', 'translate-y-10');

            // Initialize a Demo user if the community is empty (First time visitors)
            const users = JSON.parse(localStorage.getItem('siteUsers')) || [];
            if (users.length === 0) {
                users.push({
                    name: "Abhiman Student",
                    email: "student@exampaperlk.com",
                    password: "123",
                    joined: new Date().toISOString()
                });
                localStorage.setItem('siteUsers', JSON.stringify(users));
            }
        }

        function toggleMode() {
            isRegister = !isRegister;
            document.getElementById('registerFields').classList.toggle('hidden');
            document.getElementById('authContent').querySelector('h1').textContent = isRegister ? "Create Account" : "Welcome Back";
            document.getElementById('authContent').querySelector('p').textContent = isRegister ? "Join 10,000+ students today" : "Sign in to sync your progress";
            document.getElementById('submitBtn').textContent = isRegister ? "Create Free Account" : "Unlock Archive";
            document.getElementById('toggleText').textContent = isRegister ? "Already a member?" : "Access required?";
            document.getElementById('toggleBtn').textContent = isRegister ? "Sign In" : "Build Account";
        }

        function togglePassword() {
            const pass = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pass.type === 'password') {
                pass.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />';
            } else {
                pass.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('siteUsers')) || [];

            if (isRegister) {
                const name = document.getElementById('name').value;
                if (users.find(u => u.email === email)) {
                    alert("Email already registered!");
                    return;
                }
                const newUser = { name, email, password, joined: new Date().toISOString() };
                users.push(newUser);
                localStorage.setItem('siteUsers', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                alert("Account created successfully!");
                location.replace('./index.html');
            } else {
                const user = users.find(u => u.email === email);
                if (user) {
                    if (user.password !== password) {
                        alert("Invalid Credentials! Please try again.");
                        return;
                    }
                    if (user.blocked) {
                        alert("🚫 Your account has been blocked by the administrator.");
                        return;
                    }
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    location.replace('./index.html');
                } else {
                    // Auto-register to fix the mobile/different browser issue natively without backend
                    const name = email.split('@')[0];
                    const newUser = { name: name, email: email, password: password, joined: new Date().toISOString() };
                    users.push(newUser);
                    localStorage.setItem('siteUsers', JSON.stringify(users));
                    localStorage.setItem('currentUser', JSON.stringify(newUser));
                    location.replace('./index.html');
                }
            }
        }


    </script>
</body>

</html>
