<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigh In - ExamPaperLK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%) scale(1);
            }

            to {
                transform: translate(20%, 20%) scale(1.2);
            }
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">
    <!-- Animated Background -->
    <div class="orb bg-indigo-600 top-[-10%] left-[-10%]"></div>
    <div class="orb bg-purple-600 bottom-[-10%] right-[-10%]" style="animation-delay: -5s;"></div>

    <div class="w-full max-w-[450px] relative z-10 transition-all duration-700 opacity-0 transform translate-y-10"
        id="loginCard">
        <div class="glass p-10 md:p-14 rounded-[3.5rem] text-center">
            <!-- Logo Section -->
            <div
                class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-10 shadow-2xl shadow-indigo-500/20 rotate-3 transform hover:rotate-0 transition-all">
                <span class="text-4xl font-black">E</span>
            </div>

            <div id="authContent">
                <h1 class="text-4xl font-black text-white mb-3 tracking-tighter">Welcome Back</h1>
                <p class="text-slate-400 font-medium mb-10">Sign in to access premium archives</p>

                <form onsubmit="handleAuth(event)" class="space-y-4">
                    <div id="registerFields" class="hidden space-y-4">
                        <input type="text" id="name" placeholder="Full Name"
                            class="w-full px-8 py-5 rounded-2xl input-glass outline-none font-medium">
                    </div>
                    <input type="email" id="email" required placeholder="Gmail Address"
                        class="w-full px-8 py-5 rounded-2xl input-glass outline-none font-medium">
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full px-8 py-5 rounded-2xl input-glass outline-none font-medium tracking-widest text-center">

                    <button type="submit" id="submitBtn"
                        class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl hover:bg-indigo-500 transition-all shadow-xl active:scale-95 mt-4 uppercase tracking-widest text-xs">
                        Unlock Library
                    </button>

                    <div class="mt-8">
                        <p class="text-slate-500 text-sm font-medium">
                            <span id="toggleText">Don't have an account?</span>
                            <button type="button" onclick="toggleMode()"
                                class="text-indigo-400 font-black hover:text-white transition-colors ml-1"
                                id="toggleBtn">Join Now</button>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let isRegister = false;

        window.onload = () => {
            const card = document.getElementById('loginCard');
            card.classList.remove('opacity-0', 'translate-y-10');
        }

        function toggleMode() {
            isRegister = !isRegister;
            document.getElementById('registerFields').classList.toggle('hidden');
            document.getElementById('authContent').querySelector('h1').textContent = isRegister ? "Create Account" : "Welcome Back";
            document.getElementById('authContent').querySelector('p').textContent = isRegister ? "Join 10,000+ students today" : "Sign in to access premium archives";
            document.getElementById('submitBtn').textContent = isRegister ? "Create Free Account" : "Unlock Library";
            document.getElementById('toggleText').textContent = isRegister ? "Already a member?" : "Don't have an account?";
            document.getElementById('toggleBtn').textContent = isRegister ? "Sign In" : "Join Now";
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('siteUsers')) || [];

            if (isRegister) {
                const name = document.getElementById('name').value;
                if (users.find(u => u.email === email)) {
                    alert("Email already registered!");
                    return;
                }
                const newUser = { name, email, password, joined: new Date().toISOString() };
                users.push(newUser);
                localStorage.setItem('siteUsers', JSON.stringify(users));
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                alert("Account created successfully!");
                window.location.href = 'index.html';
            } else {
                const user = users.find(u => u.email === email && u.password === password);
                if (user) {
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    window.location.href = 'index.html';
                } else {
                    alert("Invalid credentials. Try again.");
                }
            }
        }
    </script>
</body>

</html>
